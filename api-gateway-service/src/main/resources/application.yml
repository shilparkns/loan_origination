server:
  port: 8080

spring:
  application:
    name: api-gateway-service

  cloud:
    gateway:
      routes:
        - id: loan-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/**

jwt:
  secret: loan-origination-secret-key-must-be-at-least-256-bits-long-for-hs256
